<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gradient.ml — live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --paper-dark: #ebe4d4;
    --ink: #1a1a1a;
    --ink-dim: #4a4a4a;
    --ink-muted: #7a7570;
    --orange: #ec6813;
    --teal: #2d6e5e;
    --red: #c0392b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100%; }
  .app { display: grid; grid-template-columns: 200px 1fr; height: 100vh; }
  .sidebar {
    border-right: 1.5px solid var(--ink);
    padding: 1rem 0.8rem;
    display: flex; flex-direction: column; gap: 0.9rem;
    background: var(--paper);
    overflow-y: auto;
  }
  .section-label { font-size: 0.6rem; color: var(--ink-muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 0.35rem; }
  .color-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.25rem; }
  .color-swatch {
    aspect-ratio: 1; border: 1.5px solid var(--ink); border-radius: 3px; cursor: pointer;
    transition: transform 0.12s ease; position: relative; box-shadow: 1px 1px 0 var(--ink);
  }
  .color-swatch:hover { transform: translate(-0.5px, -0.5px); box-shadow: 1.5px 1.5px 0 var(--ink); }
  .color-swatch.active::after { content: ''; position: absolute; inset: -4px; border: 1.5px dashed var(--ink); border-radius: 5px; pointer-events: none; }
  .control { display: flex; flex-direction: column; }
  .row { display: flex; align-items: center; gap: 0.5rem; justify-content: space-between; }
  .row label { font-size: 0.68rem; color: var(--ink-dim); }
  .row .val { font-size: 0.66rem; color: var(--ink); font-weight: 600; min-width: 28px; text-align: right; }
  select {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 0.35rem 0.4rem;
    border: 1.5px solid var(--ink); background: var(--paper); border-radius: 3px;
    color: var(--ink); cursor: pointer; box-shadow: 1px 1px 0 var(--ink);
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    background: var(--paper-dark); border: 1.5px solid var(--ink); border-radius: 2px; outline: none; margin-top: 0.25rem;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; background: var(--orange);
    border: 1.5px solid var(--ink); border-radius: 50%; cursor: pointer; box-shadow: 1px 1px 0 var(--ink);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--orange); border: 1.5px solid var(--ink); border-radius: 50%; cursor: pointer;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.63rem; font-weight: 500;
    padding: 0.4rem 0.35rem; border: 1.5px solid var(--ink); background: var(--paper);
    border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink); box-shadow: 1.5px 1.5px 0 var(--ink); display: flex;
    align-items: center; justify-content: center; gap: 0.3rem; transition: all 0.12s ease;
  }
  .btn:hover { background: var(--paper-dark); transform: translate(-0.5px, -0.5px); box-shadow: 2px 2px 0 var(--ink); }
  .btn:active { transform: translate(0.5px, 0.5px); box-shadow: 0.5px 0.5px 0 var(--ink); }
  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: #000; }
  .canvas-wrap {
    background: repeating-linear-gradient(45deg, rgba(26,26,26,0.02) 0 1px, transparent 1px 12px), var(--paper);
    display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative;
  }
  canvas {
    display: block; background: #fff; border: 1.5px solid var(--ink); border-radius: 2px;
    box-shadow: 3px 3px 0 var(--ink); cursor: crosshair; max-width: 100%; max-height: 100%; touch-action: none;
  }
  .status-bar {
    position: absolute; bottom: 1rem; left: 1rem; background: var(--ink); color: var(--paper);
    font-size: 0.63rem; padding: 0.3rem 0.65rem; border-radius: 3px; font-weight: 500;
    letter-spacing: 0.05em; display: flex; gap: 0.6rem;
  }
  .status-bar .dot { color: var(--orange); }
  .help {
    position: absolute; bottom: 1rem; right: 1rem; background: var(--paper); border: 1.5px solid var(--ink);
    font-size: 0.58rem; padding: 0.3rem 0.6rem; border-radius: 3px; box-shadow: 1.5px 1.5px 0 var(--ink);
    color: var(--ink-dim); letter-spacing: 0.03em;
  }
  .help kbd { background: var(--ink); color: var(--paper); padding: 0.05em 0.3em; border-radius: 2px; font-weight: 600; font-size: 0.95em; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="control">
      <div class="section-label">Color</div>
      <div class="color-row" id="colors"></div>
    </div>
    <div class="control">
      <div class="section-label">Blend</div>
      <select id="blend">
        <option value="idw" selected>Smooth (IDW)</option>
        <option value="additive">Additive</option>
      </select>
    </div>
    <div class="control">
      <div class="section-label">Spread</div>
      <div class="row"><label>radius</label><span class="val" id="spreadVal">200</span></div>
      <input type="range" id="spread" min="40" max="500" value="200">
    </div>
    <div class="control">
      <div class="section-label">Opacity</div>
      <div class="row"><label>alpha</label><span class="val" id="alphaVal">0.85</span></div>
      <input type="range" id="alpha" min="10" max="100" value="85">
    </div>
    <div class="control">
      <div class="section-label">Background</div>
      <select id="bg">
        <option value="#ffffff" selected>White</option>
        <option value="#f5f0e6">Paper</option>
        <option value="#1a1a1a">Ink</option>
        <option value="#000000">Black</option>
      </select>
    </div>
    <div class="control">
      <div class="section-label">Actions</div>
      <div class="btns">
        <button class="btn" id="clearBtn">CLEAR</button>
        <button class="btn primary" id="randBtn">RANDOM</button>
        <button class="btn" id="exportBtn">PNG</button>
        <button class="btn" id="undoBtn">UNDO</button>
      </div>
    </div>
    <div class="control" style="margin-top:auto;">
      <div class="section-label">Stats</div>
      <div class="row"><label>nodes</label><span class="val" id="nodeVal">0</span></div>
    </div>
  </aside>
  <div class="canvas-wrap">
    <canvas id="c" width="640" height="576"></canvas>
    <div class="status-bar"><span class="dot">●</span><span id="mode">click to place · drag to move</span></div>
    <div class="help">click <kbd>LMB</kbd> · drag node · right-click <kbd>DEL</kbd> · <kbd>Z</kbd> undo</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = canvas.width, CH = canvas.height;

const palette = [
  {name:'ink',     r:26,  g:26,  b:26},
  {name:'orange',  r:236, g:104, b:19},
  {name:'teal',    r:45,  g:110, b:94},
  {name:'red',     r:192, g:57,  b:43},
  {name:'gold',    r:212, g:160, b:23},
  {name:'plum',    r:120, g:81,  b:169},
  {name:'sky',     r:86,  g:160, b:211},
  {name:'rose',    r:211, g:94,  b:131},
  {name:'forest',  r:56,  g:124, b:68},
  {name:'coral',   r:235, g:137, b:100},
  {name:'slate',   r:108, g:117, b:125},
  {name:'cream',   r:245, g:235, b:210},
];
let activeColor = 1;

let nodes = [];
let history = [];
let spread = 200;
let alpha = 0.85;
let blendMode = 'source-over';
let bgColor = '#ffffff';

let dragging = null;
let selected = null;

function saveHistory() {
  history.push(JSON.parse(JSON.stringify(nodes)));
  if (history.length > 40) history.shift();
}

// Render at half resolution for performance, upscale
const SCALE = 2;
const RW = CW / SCALE, RH = CH / SCALE;
const offscreen = document.createElement('canvas');
offscreen.width = RW; offscreen.height = RH;
const octx = offscreen.getContext('2d');
const imgData = octx.createImageData(RW, RH);

function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}

function render() {
  const data = imgData.data;
  const bg = hexToRgb(bgColor);

  if (nodes.length === 0) {
    for (let i = 0; i < data.length; i += 4) {
      data[i] = bg[0]; data[i+1] = bg[1]; data[i+2] = bg[2]; data[i+3] = 255;
    }
  } else {
    // IDW (inverse distance weighting) blending
    for (let py = 0; py < RH; py++) {
      for (let px = 0; px < RW; px++) {
        const x = px * SCALE, y = py * SCALE;
        let totalW = 0;
        let rSum = 0, gSum = 0, bSum = 0;

        for (const n of nodes) {
          const dx = x - n.x, dy = y - n.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          // Smooth falloff within spread radius
          const t = Math.min(dist / n.spread, 1);
          const falloff = (1 - t * t);
          if (falloff <= 0) continue;
          const w = falloff * falloff * n.alpha;
          rSum += n.r * w;
          gSum += n.g * w;
          bSum += n.b * w;
          totalW += w;
        }

        const idx = (py * RW + px) * 4;
        if (totalW > 0.001) {
          if (blendMode === 'additive') {
            data[idx]     = Math.min(255, Math.round(bg[0] + rSum));
            data[idx + 1] = Math.min(255, Math.round(bg[1] + gSum));
            data[idx + 2] = Math.min(255, Math.round(bg[2] + bSum));
          } else {
            const a = Math.min(totalW, 1);
            data[idx]     = Math.round(bg[0] * (1 - a) + (rSum / totalW) * a);
            data[idx + 1] = Math.round(bg[1] * (1 - a) + (gSum / totalW) * a);
            data[idx + 2] = Math.round(bg[2] * (1 - a) + (bSum / totalW) * a);
          }
        } else {
          data[idx] = bg[0]; data[idx+1] = bg[1]; data[idx+2] = bg[2];
        }
        data[idx + 3] = 255;
      }
    }
  }

  octx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(offscreen, 0, 0, CW, CH);

  // Draw small dot markers
  for (const n of nodes) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = n === selected ? '#ec6813' : 'rgba(26,26,26,0.5)';
    ctx.fill();
  }

  document.getElementById('nodeVal').textContent = nodes.length;
}

function hitTest(x, y) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (dx * dx + dy * dy < 20 * 20) return n;
  }
  return null;
}

function addNode(x, y) {
  saveHistory();
  const c = palette[activeColor];
  const n = { x, y, r: c.r, g: c.g, b: c.b, spread, alpha };
  nodes.push(n);
  selected = n;
  render();
}

function removeNode(n) {
  saveHistory();
  nodes = nodes.filter(nd => nd !== n);
  if (selected === n) selected = null;
  render();
}

canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (CW / rect.width);
  const y = (e.clientY - rect.top) * (CH / rect.height);

  if (e.button === 2) {
    const hit = hitTest(x, y);
    if (hit) removeNode(hit);
    return;
  }

  const hit = hitTest(x, y);
  if (hit) {
    selected = hit;
    dragging = hit;
    canvas.setPointerCapture(e.pointerId);
    render();
  } else {
    addNode(x, y);
  }
});

canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragging.x = (e.clientX - rect.left) * (CW / rect.width);
  dragging.y = (e.clientY - rect.top) * (CH / rect.height);
  render();
});

canvas.addEventListener('pointerup', () => {
  if (dragging) { saveHistory(); dragging = null; }
});
canvas.addEventListener('pointercancel', () => { dragging = null; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Controls
function buildPalette() {
  const row = document.getElementById('colors');
  palette.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'color-swatch' + (i === activeColor ? ' active' : '');
    el.style.background = `rgb(${c.r},${c.g},${c.b})`;
    el.title = c.name;
    el.onclick = () => {
      activeColor = i;
      row.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    };
    row.appendChild(el);
  });
}

document.getElementById('spread').oninput = e => {
  spread = +e.target.value;
  document.getElementById('spreadVal').textContent = spread;
  if (selected) { selected.spread = spread; render(); }
};
document.getElementById('alpha').oninput = e => {
  alpha = +e.target.value / 100;
  document.getElementById('alphaVal').textContent = alpha.toFixed(2);
  if (selected) { selected.alpha = alpha; render(); }
};
document.getElementById('blend').onchange = e => { blendMode = e.target.value; render(); };
// blendMode now controls IDW vs additive in render loop
document.getElementById('bg').onchange = e => { bgColor = e.target.value; render(); };

document.getElementById('clearBtn').onclick = () => { saveHistory(); nodes = []; selected = null; render(); };
document.getElementById('undoBtn').onclick = undo;
document.getElementById('exportBtn').onclick = () => {
  const sel = selected; selected = null;
  render();
  // Grab the upscaled image without handles by re-drawing just the offscreen buffer
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(offscreen, 0, 0, CW, CH);
  const link = document.createElement('a');
  link.download = 'gradient.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  selected = sel;
  render();
};

document.getElementById('randBtn').onclick = () => {
  saveHistory();
  nodes = [];
  const count = 4 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const c = palette[Math.floor(Math.random() * palette.length)];
    nodes.push({
      x: 60 + Math.random() * (CW - 120),
      y: 60 + Math.random() * (CH - 120),
      r: c.r, g: c.g, b: c.b,
      spread: 120 + Math.random() * 280,
      alpha: 0.5 + Math.random() * 0.5,
    });
  }
  selected = null;
  render();
};

function undo() {
  if (!history.length) return;
  nodes = history.pop();
  selected = null;
  render();
}

window.addEventListener('keydown', e => {
  if (e.key === 'z' || e.key === 'Z') undo();
  if ((e.key === 'Delete' || e.key === 'Backspace') && selected) removeNode(selected);
});

// Initial preset
function init() {
  buildPalette();
  nodes = [];
  render();
}

init();
</script>
</body>
</html>
