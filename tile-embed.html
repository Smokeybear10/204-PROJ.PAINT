<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tile.ml — live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --paper-dark: #ebe4d4;
    --ink: #1a1a1a;
    --ink-dim: #4a4a4a;
    --ink-muted: #7a7570;
    --orange: #ec6813;
    --teal: #2d6e5e;
    --red: #c0392b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100%; }
  .app { display: grid; grid-template-columns: 180px 1fr; height: 100vh; }
  .sidebar {
    border-right: 1.5px solid var(--ink); padding: 0.9rem 0.7rem;
    display: flex; flex-direction: column; gap: 0.8rem; background: var(--paper); overflow-y: auto;
  }
  .section-label { font-size: 0.58rem; color: var(--ink-muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 0.3rem; }
  .tool-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.25rem; }
  .tool-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 500;
    padding: 0.4rem 0.2rem; border: 1.5px solid var(--ink); background: var(--paper);
    border-radius: 3px; cursor: pointer; text-align: center; color: var(--ink);
    box-shadow: 1px 1px 0 var(--ink); transition: all 0.12s ease; text-transform: uppercase;
  }
  .tool-btn:hover { background: var(--paper-dark); }
  .tool-btn.active { background: var(--ink); color: var(--paper); }
  .color-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.2rem; }
  .color-swatch {
    aspect-ratio: 1; border: 1.5px solid var(--ink); border-radius: 3px; cursor: pointer;
    position: relative; box-shadow: 1px 1px 0 var(--ink);
  }
  .color-swatch.active::after { content: ''; position: absolute; inset: -3px; border: 1.5px dashed var(--ink); border-radius: 5px; pointer-events: none; }
  .sym-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.25rem; }
  .sym-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 500;
    padding: 0.35rem 0.15rem; border: 1.5px solid var(--ink); background: var(--paper);
    border-radius: 3px; cursor: pointer; text-align: center; color: var(--ink);
    box-shadow: 1px 1px 0 var(--ink); text-transform: uppercase;
  }
  .sym-btn:hover { background: var(--paper-dark); }
  .sym-btn.active { background: var(--ink); color: var(--paper); }
  select {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 0.3rem;
    border: 1.5px solid var(--ink); background: var(--paper); border-radius: 3px;
    color: var(--ink); cursor: pointer; box-shadow: 1px 1px 0 var(--ink); width: 100%;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 500;
    padding: 0.35rem 0.3rem; border: 1.5px solid var(--ink); background: var(--paper);
    border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink); box-shadow: 1.5px 1.5px 0 var(--ink); text-align: center;
    transition: all 0.12s ease;
  }
  .btn:hover { background: var(--paper-dark); }
  .btn:active { transform: translate(0.5px, 0.5px); box-shadow: 0.5px 0.5px 0 var(--ink); }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: #000; }
  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem; }

  .canvas-wrap {
    display: flex; align-items: center; justify-content: center; position: relative;
    overflow: hidden;
  }
  canvas { display: block; touch-action: none; }
  #preview { position: absolute; inset: 0; z-index: 0; image-rendering: pixelated; }
  #editor {
    position: relative; z-index: 1; border: 2px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    cursor: crosshair; image-rendering: pixelated;
  }
  .status-bar {
    position: absolute; bottom: 0.8rem; left: 0.8rem; background: var(--ink); color: var(--paper);
    font-size: 0.6rem; padding: 0.25rem 0.55rem; border-radius: 3px; font-weight: 500;
    letter-spacing: 0.05em; z-index: 2; display: flex; gap: 0.5rem;
  }
  .status-bar .dot { color: var(--orange); }
  .help {
    position: absolute; bottom: 0.8rem; right: 0.8rem; background: var(--paper);
    border: 1.5px solid var(--ink); font-size: 0.55rem; padding: 0.25rem 0.5rem;
    border-radius: 3px; box-shadow: 1.5px 1.5px 0 var(--ink); color: var(--ink-dim);
    z-index: 2; letter-spacing: 0.03em;
  }
  .help kbd { background: var(--ink); color: var(--paper); padding: 0.05em 0.25em; border-radius: 2px; font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="control">
      <div class="section-label">Tool</div>
      <div class="tool-row">
        <button class="tool-btn active" data-tool="draw">Draw</button>
        <button class="tool-btn" data-tool="erase">Erase</button>
        <button class="tool-btn" data-tool="fill">Fill</button>
        <button class="tool-btn" data-tool="line">Line</button>
      </div>
    </div>
    <div class="control">
      <div class="section-label">Color</div>
      <div class="color-row" id="colors"></div>
    </div>
    <div class="control">
      <div class="section-label">Symmetry</div>
      <div class="sym-row">
        <button class="sym-btn active" data-sym="none">None</button>
        <button class="sym-btn" data-sym="h">H Mirror</button>
        <button class="sym-btn" data-sym="v">V Mirror</button>
        <button class="sym-btn" data-sym="4way">4-Way</button>
      </div>
    </div>
    <div class="control">
      <div class="section-label">Tile Size</div>
      <select id="tileSize">
        <option value="8">8 × 8</option>
        <option value="12">12 × 12</option>
        <option value="16" selected>16 × 16</option>
        <option value="24">24 × 24</option>
      </select>
    </div>
    <div class="control">
      <div class="section-label">Actions</div>
      <div class="btns">
        <button class="btn" id="clearBtn">Clear</button>
        <button class="btn primary" id="randBtn">Random</button>
        <button class="btn" id="undoBtn">Undo</button>
        <button class="btn" id="exportBtn">PNG</button>
      </div>
    </div>
  </aside>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="preview"></canvas>
    <canvas id="editor"></canvas>
    <div class="status-bar"><span class="dot">●</span><span id="mode">draw to tile</span></div>
    <div class="help"><kbd>1-4</kbd> tools · <kbd>Z</kbd> undo · <kbd>C</kbd> clear · <kbd>R</kbd> random</div>
  </div>
</div>

<script src="tile.js"></script>
</body>
</html>
